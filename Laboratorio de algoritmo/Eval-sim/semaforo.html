<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let semaforo =
        {
            color: "verde",
            iniciarSimulacion(cantCambios) {
                let x;
                for (x = 0; x <= cantCambios; x++) {
                    switch (this.color) {
                        case "verde":
                            this.color = "amarillo";
                            break;
                        case "amarillo":
                            this.color = "rojo";
                            break;
                        case "rojo":
                            this.color = "verde"
                            break;
                    }
                    console.log("el color del semaforo paso a " + this.color)
                }
            }
        }
        semaforo.iniciarSimulacion(5);
    </script>
</body>

</html>
