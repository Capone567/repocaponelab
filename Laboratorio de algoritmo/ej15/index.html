    <script>
        function sumar(array, item){
           array.push(item);
           return array;
        }

        let tarea = ["barrer", "lavar" , "limpiar"]
        tarea.push("aspirar");

        tarea.pop();

        tarea.unshift("Prender lavaropa");

        tarea.shift();

        for (x = 0; x < tarea.length ; x++) { 
            tarea.shift();
            console.log(tarea);
        }

        let carrito = ["Huevo","Leche","Manteca"];

        console.log(numeros);

        numeros.shift();

        console.log(numeros);

        console.log(sumar(numeros,4))

        let fill = [];

            fill.push(z);
