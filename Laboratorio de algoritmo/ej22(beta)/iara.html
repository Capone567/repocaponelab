<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Iara</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
        }

        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 5rem;
            color: #ff4b2b;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            margin: 0;
            animation: latido 1.5s infinite;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Estilos para los corazones flotantes */
        .corazon {
            position: absolute;
            color: #ff4b2b;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: flotar linear forwards;
        }

        @keyframes flotar {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>IARA TE AMO</h1>
        <p style="color: #d63031; font-size: 1.5rem; margin-top: 20px;">❤️ Eres lo mejor de mi vida ❤️</p>
    </div>

    <script>
        function crearCorazon() {
            const corazon = document.createElement('div');
            corazon.classList.add('corazon');
            corazon.innerHTML = '❤️';
            
            // Posición horizontal aleatoria
            corazon.style.left = Math.random() * 100 + 'vw';
            
            // Tamaño aleatorio
            const size = Math.random() * 30 + 10 + 'px';
            corazon.style.fontSize = size;
            
            // Duración de la animación aleatoria
            const duracion = Math.random() * 3 + 2 + 's';
            corazon.style.animationDuration = duracion;
            
            document.body.appendChild(corazon);
            
            // Eliminar el corazón después de que termine la animación
            setTimeout(() => {
                corazon.remove();
            }, 5000);
        }

        // Crear corazones continuamente
        setInterval(crearCorazon, 300);
    </script>
</body>
</html>
